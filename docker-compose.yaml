services:
  kestra:
    image: kestra/kestra:latest
    user: "root"
    pull_policy: if_not_present # always - to pull the latest image, if_not_present - to use the local image if it exists
    entrypoint: /bin/bash
    command: -c 'exec /app/kestra server standalone --worker-thread=128'
    volumes:
      - kestra-data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
      - ./extraction:/app/extraction        # mounts your pipeline files
      - ./dbt:/app/dbt                      # mounts your dbt project
      - ./data:/app/data                    # mounts your data directory
      - C:\Users\user\AppData\Roaming\gcloud:/root/.config/gcloud:ro                    # mounts your dbt project
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4
        kestra:
          server:
            basicAuth:
              enabled: false
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
          queue:
            type: postgres
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kestra"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kestra-data:
  postgres-data: