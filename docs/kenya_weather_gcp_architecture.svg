<svg width="100%" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
  text { font-family: Arial, sans-serif; }
  .th  { font-size: 14px; font-weight: 600; }
  .ts  { font-size: 12px; font-weight: 400; fill: #555; }
  .c-teal   > rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal   > text, .c-teal text { fill: #085041; }
  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple > text, .c-purple text { fill: #3C3489; }
  .c-amber  > rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber  > text, .c-amber text { fill: #633806; }
  .c-blue   > rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue   > text, .c-blue text { fill: #0C447C; }
  .c-green  > rect { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green  > text, .c-green text { fill: #27500A; }
  .c-coral  > rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral  > text, .c-coral text { fill: #712B13; }
  .c-gray   > rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray   > text, .c-gray text { fill: #444441; }
  .arr { stroke: #888; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
</style>
</defs>

<!-- Layer labels -->
<text class="ts" x="30" y="88"  text-anchor="middle" transform="rotate(-90,30,88)">Sources</text>
<text class="ts" x="30" y="210" text-anchor="middle" transform="rotate(-90,30,210)">Ingest</text>
<text class="ts" x="30" y="335" text-anchor="middle" transform="rotate(-90,30,335)">Storage</text>
<text class="ts" x="30" y="460" text-anchor="middle" transform="rotate(-90,30,460)">Transform</text>
<text class="ts" x="30" y="575" text-anchor="middle" transform="rotate(-90,30,575)">Serve</text>

<!-- Dividers -->
<line x1="52" y1="148" x2="648" y2="148" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>
<line x1="52" y1="268" x2="648" y2="268" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>
<line x1="52" y1="390" x2="648" y2="390" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>
<line x1="52" y1="510" x2="648" y2="510" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>

<!-- ROW 1: SOURCES -->
<g class="c-teal">
  <rect x="58" y="22" width="150" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="133" y="41" text-anchor="middle" dominant-baseline="central">Open-Meteo API</text>
  <text class="ts" x="133" y="59" text-anchor="middle" dominant-baseline="central">Daily weather</text>
</g>
<g class="c-teal">
  <rect x="228" y="22" width="150" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="303" y="41" text-anchor="middle" dominant-baseline="central">Open-Meteo Archive</text>
  <text class="ts" x="303" y="59" text-anchor="middle" dominant-baseline="central">1981–2024 history</text>
</g>
<g class="c-teal">
  <rect x="398" y="22" width="130" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="463" y="41" text-anchor="middle" dominant-baseline="central">KMD ENACTS</text>
  <text class="ts" x="463" y="59" text-anchor="middle" dominant-baseline="central">Validation source</text>
</g>
<g class="c-gray">
  <rect x="548" y="22" width="92" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="594" y="41" text-anchor="middle" dominant-baseline="central">CSV files</text>
  <text class="ts" x="594" y="59" text-anchor="middle" dominant-baseline="central">Dim tables</text>
</g>

<!-- Sources → dlt -->
<line x1="133" y1="72" x2="200" y2="168" class="arr"/>
<line x1="303" y1="72" x2="270" y2="168" class="arr"/>
<line x1="463" y1="72" x2="370" y2="168" class="arr"/>
<line x1="594" y1="72" x2="490" y2="168" class="arr"/>

<!-- ROW 2: INGESTION -->
<g class="c-purple">
  <rect x="58" y="168" width="320" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="218" y="187" text-anchor="middle" dominant-baseline="central">dlt (data load tool)</text>
  <text class="ts" x="218" y="205" text-anchor="middle" dominant-baseline="central">Extract + load to GCS and BigQuery</text>
</g>
<g class="c-gray">
  <rect x="398" y="168" width="242" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="519" y="187" text-anchor="middle" dominant-baseline="central">Terraform</text>
  <text class="ts" x="519" y="205" text-anchor="middle" dominant-baseline="central">Provision GCS + BigQuery</text>
</g>

<!-- dlt → GCS and BQ -->
<line x1="160" y1="218" x2="160" y2="288" class="arr"/>
<line x1="276" y1="218" x2="400" y2="288" class="arr"/>

<!-- ROW 3: STORAGE -->
<g class="c-amber">
  <rect x="58" y="288" width="240" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="178" y="307" text-anchor="middle" dominant-baseline="central">Cloud Storage (GCS)</text>
  <text class="ts" x="178" y="325" text-anchor="middle" dominant-baseline="central">Raw JSON — data lake</text>
</g>
<g class="c-blue">
  <rect x="318" y="288" width="322" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="479" y="307" text-anchor="middle" dominant-baseline="central">BigQuery</text>
  <text class="ts" x="479" y="325" text-anchor="middle" dominant-baseline="central">raw · staging · dim tables</text>
</g>

<!-- Storage → dbt -->
<line x1="178" y1="338" x2="250" y2="410" class="arr"/>
<line x1="479" y1="338" x2="400" y2="410" class="arr"/>

<!-- ROW 4: TRANSFORM -->
<g class="c-coral">
  <rect x="58" y="410" width="270" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="193" y="429" text-anchor="middle" dominant-baseline="central">dbt</text>
  <text class="ts" x="193" y="447" text-anchor="middle" dominant-baseline="central">staging · marts · alerts</text>
</g>
<g class="c-purple">
  <rect x="348" y="410" width="292" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="494" y="429" text-anchor="middle" dominant-baseline="central">Kestra</text>
  <text class="ts" x="494" y="447" text-anchor="middle" dominant-baseline="central">Orchestrates all pipeline tasks</text>
</g>

<!-- dbt → BQ analytics -->
<line x1="193" y1="460" x2="300" y2="530" class="arr"/>

<!-- Kestra orchestration loop (dashed) -->
<path d="M494 460 L494 480 L640 480 L640 195 L382 195" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>

<!-- ROW 5: SERVE -->
<g class="c-blue">
  <rect x="58" y="530" width="240" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="178" y="549" text-anchor="middle" dominant-baseline="central">BigQuery (analytics)</text>
  <text class="ts" x="178" y="567" text-anchor="middle" dominant-baseline="central">fact tables · alert views</text>
</g>
<g class="c-green">
  <rect x="318" y="530" width="175" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="405" y="549" text-anchor="middle" dominant-baseline="central">Looker Studio</text>
  <text class="ts" x="405" y="567" text-anchor="middle" dominant-baseline="central">Maps · KPIs · alerts</text>
</g>
<line x1="298" y1="555" x2="316" y2="555" class="arr"/>

<!-- Legend -->
<rect x="58"  y="600" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56"/>
<text class="ts" x="74"  y="609">Sources</text>
<rect x="133" y="600" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7"/>
<text class="ts" x="149" y="609">Compute</text>
<rect x="223" y="600" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B"/>
<text class="ts" x="239" y="609">Storage</text>
<rect x="298" y="600" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#185FA5"/>
<text class="ts" x="314" y="609">BigQuery</text>
<rect x="383" y="600" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D"/>
<text class="ts" x="399" y="609">dbt</text>
<rect x="433" y="600" width="10" height="10" rx="2" fill="#EAF3DE" stroke="#3B6D11"/>
<text class="ts" x="449" y="609">Dashboard</text>
<text class="ts" x="530" y="609">-- Kestra loop</text>
</svg>